<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example React App</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(180deg, #f5f7fb 0%, #e8eefc 100%);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React from 'https://esm.sh/react@18';
      import { createRoot } from 'https://esm.sh/react-dom@18/client';

      function App() {
        return React.createElement(
          'main',
          {
            style: {
              minHeight: '100vh',
              display: 'grid',
              placeItems: 'center',
              padding: '1rem'
            }
          },
          React.createElement(
            'section',
            {
              style: {
                background: 'white',
                borderRadius: '12px',
                padding: '2rem',
                maxWidth: '560px',
                boxShadow: '0 10px 24px rgba(0,0,0,0.08)'
              }
            },
            React.createElement(
              'header',
              { style: { textAlign: 'center', marginBottom: '1.5rem' } },
              React.createElement('h1', { style: { marginTop: 0, marginBottom: '0.75rem' } }, 'Hello React 👋'),
              React.createElement(
                'p',
                { style: { lineHeight: 1.5, margin: 0, color: '#4b5563' } },
                'This is a very simple example frontend that runs locally with a shell script.'
              )
            ),
            React.createElement(
              'section',
              {
                'aria-label': 'Content',
                style: {
                  borderTop: '1px solid #e5e7eb',
                  paddingTop: '1.5rem'
                }
              },
              React.createElement('h2', { style: { marginTop: 0, marginBottom: '0.75rem' } }, 'Content'),
              React.createElement(
                'p',
                { style: { lineHeight: 1.6, marginTop: 0, color: '#374151' } },
                'Sample content lives here to show how supporting copy can sit below the main heading and introduction.'
              ),
              React.createElement(
                'p',
                { style: { lineHeight: 1.6, marginBottom: 0, color: '#374151' } },
                'Use this section for short updates, feature details, or other contextual information that should be easy to scan.'
              )
            )
          )
        );
      }

      createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
  </body>
</html>
