<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example React App</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React from 'https://esm.sh/react@18';
      import { createRoot } from 'https://esm.sh/react-dom@18/client';

      function App() {
        return React.createElement(
          'main',
          {
            style: {
              minHeight: '100vh',
              display: 'grid',
              placeItems: 'center',
              padding: '1rem'
            }
          },
          React.createElement(
            'section',
            {
              style: {
                background: 'white',
                borderRadius: '12px',
                padding: '2rem',
                textAlign: 'center',
                maxWidth: '440px',
                boxShadow: '0 10px 24px rgba(0,0,0,0.08)'
              }
            },
            React.createElement('h1', { style: { marginTop: 0 } }, 'Hello React 👋'),
            React.createElement(
              'div',
              {
                style: {
                  display: 'grid',
                  gap: '1rem',
                  textAlign: 'left'
                }
              },
              React.createElement(
                'p',
                { style: { lineHeight: 1.5, margin: 0, textAlign: 'center' } },
                'This is a very simple example frontend that runs locally with a shell script.'
              ),
              React.createElement(
                'section',
                {
                  'aria-labelledby': 'content-heading',
                  style: {
                    background: '#f5f7fb',
                    borderRadius: '10px',
                    padding: '1rem 1.25rem'
                  }
                },
                React.createElement(
                  'h2',
                  {
                    id: 'content-heading',
                    style: {
                      margin: '0 0 0.5rem',
                      fontSize: '1.1rem'
                    }
                  },
                  'Content'
                ),
                React.createElement(
                  'p',
                  {
                    style: {
                      lineHeight: 1.6,
                      margin: 0,
                      color: '#334155'
                    }
                  },
                  'Sample content lives here so the page has a clear section beneath the main heading. You can replace this text with product details, onboarding notes, or any other frontend copy later.'
                )
              )
            )
          )
        );
      }

      createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
  </body>
</html>
