<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Example React App</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import React from 'https://esm.sh/react@18';
      import { createRoot } from 'https://esm.sh/react-dom@18/client';

      function App() {
        return React.createElement(
          'main',
          {
            style: {
              minHeight: '100vh',
              display: 'grid',
              placeItems: 'center',
              padding: '1rem'
            }
          },
          React.createElement(
            'section',
            {
              style: {
                background: 'white',
                borderRadius: '12px',
                padding: '2rem',
                textAlign: 'center',
                maxWidth: '560px',
                boxShadow: '0 10px 24px rgba(0,0,0,0.08)'
              }
            },
            React.createElement(
              'header',
              null,
              React.createElement('h1', { style: { marginTop: 0, marginBottom: '0.75rem' } }, 'Hello React 👋'),
              React.createElement(
                'p',
                { style: { lineHeight: 1.5, marginTop: 0, marginBottom: '1.5rem' } },
                'This is a very simple example frontend that runs locally with a shell script.'
              )
            ),
            React.createElement(
              'section',
              {
                'aria-labelledby': 'content-heading',
                style: {
                  textAlign: 'left',
                  borderTop: '1px solid #e2e8f0',
                  paddingTop: '1.5rem'
                }
              },
              React.createElement(
                'h2',
                {
                  id: 'content-heading',
                  style: { marginTop: 0, marginBottom: '0.75rem', fontSize: '1.25rem' }
                },
                'Content'
              ),
              React.createElement(
                'p',
                { style: { lineHeight: 1.6, marginTop: 0, marginBottom: '0.75rem' } },
                'This sample content section sits directly under the heading area and gives the page a clearer structure.'
              ),
              React.createElement(
                'p',
                { style: { lineHeight: 1.6, marginTop: 0, marginBottom: 0 } },
                'Use this space for a short summary, feature highlights, or any introductory copy you want visitors to read next.'
              )
            )
          )
        );
      }

      createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
  </body>
</html>
